      title: Propulsion Design
      style: floating
      collapse-level: 1
      contents:
        - section: Injectors
          contents:
            - section: Pintle Injector
              contents:
                - text: Design Procedures for Moveable Pintle
                  href: knowledge-base/propulsion-design/injector/pintle/design-procedures-moveable-pintle.qmd
        - section: Sprays and Atomization
          contents:
            - text: Spray Dropsize Correlations
              href: knowledge-base/propulsion-design/sprays-and-atomization/spray-dropsize-correlations.qmd
            - text: Spray Impingement Simulation
              href: knowledge-base/propulsion-design/sprays-and-atomization/spray-impingement-simulation.qmd
format:
  html:
    theme: cosmo
    grid:
      sidebar-width: 300px
      body-width: 1300px
      margin-width: 250px
      gutter-width: 1.5rem
    css: styles.css
    toc: true
    html-math-method: katex

crossref:
  eq-prefix: Eqn.
  eq-title: ""
  fig-prefix: Fig.
  sec-prefix: Sec.